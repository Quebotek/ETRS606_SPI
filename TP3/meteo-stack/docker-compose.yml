services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mqtt_broker
    restart: always
    ports:
      - "1883:1883"
      - "18830:1883" # On peut aussi mapper le port 18830 ici pour Docker
    volumes:
      - ./mosquitto/config:/mosquitto/config # On monte tout le dossier
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  mqtt-bridge:
    image: python:3.9-slim
    container_name: mqtt_bridge
    restart: always
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - mosquitto
    command: >
      sh -c "apt-get update && apt-get install -y zabbix-sender && 
         pip install paho-mqtt requests && 
         python -u mqtt_to_zabbix.py"

  meteo-france-api:
    image: python:3.9-slim
    container_name: meteo_france_api
    restart: always
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "apt-get update && apt-get install -y zabbix-sender && 
         pip install requests && 
         python -u meteo_france.py"


  ai-brain:
    image: python:3.9-slim
    container_name: ai_brain
    restart: always
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "pip install flask tensorflow-cpu scikit-learn joblib numpy pandas && 
             python -u ai_brain.py"
